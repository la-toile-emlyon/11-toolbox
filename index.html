<!DOCTYPE html>
<html lang="fr">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Toolbox</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>
   <h1>Composants CSS</h1>
   <section id="buttons">
      <h2>Des boutons</h2>
      <div class="buttons-container">
         <a href="#" class="button primary">Primaire</a>
         <a href="#" class="button secondary">Secondaire</a>
      </div>
   </section>

   <section id="avatar">
      <h2>Un avatar</h2>
      <img class="avatar" src="assets/avatar.jpg" alt="Avatar utilisateur">
   </section>

   <section id="link">
      <h2>Un lien</h2>
      <a href="#" class="link">Lien hypertexte</a>
   </section>

   <section id="card">
      <h2>Une carte</h2>

      <article class="card">
         <img src="assets/icon.svg" alt="icon">
         <h3>Une icone</h3>
      </article>
   </section>

   <section id="hero">
      <h2>Un hero banner</h2>

      <header class="hero">
         <h1>Un titre</h1>
         <p>Une courte description</p>
      </header>
   </section>

</body>
</html>
